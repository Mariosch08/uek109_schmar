<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Seite</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

    :root {
      --bg: #0e0e0e;
      --card: #161616;
      --border: #2a2a2a;
      --accent: #c8f04a;
      --text: #e8e8e8;
      --muted: #666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      animation: fadeIn 0.6s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 2px 10px;
      border-radius: 2px;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    h1 span { color: var(--accent); }

    p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.88rem;
      margin-bottom: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .cell {
      background: var(--card);
      padding: 1.2rem;
    }

    .cell .label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .cell .value {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
    }

    .cell .value.ok { color: var(--accent); }

    button {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    #status {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      min-height: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="tag">HTML Test</div>
    <h1>Alles <span>läuft.</span></h1>
    <p>Eine einfache Testseite — HTML, CSS, ein bisschen JavaScript. Kein Framework, kein Overhead.</p>

    <div class="grid">
      <div class="cell">
        <div class="label">HTML</div>
        <div class="value ok">✓ OK</div>
      </div>
      <div class="cell">
        <div class="label">CSS</div>
        <div class="value ok">✓ OK</div>
      </div>
      <div class="cell">
        <div class="label">JavaScript</div>
        <div class="value" id="js-status">—</div>
      </div>
      <div class="cell">
        <div class="label">Uhrzeit</div>
        <div class="value" id="time">—</div>
      </div>
    </div>

    <button onclick="runTest()">Test ausführen</button>
    <div id="status"></div>
  </div>

  <script>
    // JS-Status sofort setzen
    document.getElementById('js-status').textContent = '✓ OK';
    document.getElementById('js-status').classList.add('ok');

    // Uhrzeit
    function updateTime() {
      const now = new Date();
      document.getElementById('time').textContent =
        now.toLocaleTimeString('de-CH');
    }
    updateTime();
    setInterval(updateTime, 1000);

    function runTest() {
      const status = document.getElementById('status');
      status.textContent = 'Test läuft...';
      setTimeout(() => {
        status.textContent = '✓ Alle Komponenten funktionieren korrekt.';
        status.style.color = '#c8f04a';
      }, 800);
    }
  </script>
</body>
</html>
